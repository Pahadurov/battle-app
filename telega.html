<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Битва мнений</title>
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Стили, чтобы было красиво на телефоне */
        body {
            font-family: Arial, sans-serif;
            background: #1f1f2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            flex-direction: column;
        }
        .card {
            background: #2c2c3e;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .btn {
            background: #6c5ce7;
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover {
            background: #5a4bd1;
        }
        .input-group {
            margin: 15px 0;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            opacity: 0.7;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #3d3d5c;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚔️ Битва мнений</h1>
        <p id="status">Режим: <strong>1/1</strong></p>
        
        <!-- Экран регистрации игроков -->
        <div id="setup-screen">
            <div class="input-group">
                <label>👤 Имя игрока 1</label>
                <input id="player1" type="text" placeholder="Введите имя...">
            </div>
            <div class="input-group">
                <label>👤 Имя игрока 2</label>
                <input id="player2" type="text" placeholder="Введите имя...">
            </div>
            <button class="btn" onclick="startBattle()">🚀 Начать битву</button>
        </div>

        <!-- Экран батла -->
        <div id="battle-screen" class="hidden">
            <h3 id="current-player">Ход: </h3>
            <div class="input-group">
                <label>📝 Ваш аргумент</label>
                <input id="argument-input" type="text" placeholder="Напишите аргумент...">
            </div>
            <button class="btn" onclick="sendArgument()">📤 Отправить</button>
            <button class="btn" style="background: #e17055; margin-top: 10px;" onclick="endBattle()">⏹️ Завершить</button>
        </div>

        <!-- Экран результата -->
        <div id="result-screen" class="hidden">
            <h2>🏆 Результаты</h2>
            <div id="result-text"></div>
            <button class="btn" onclick="resetGame()">🔄 Играть снова</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. ПОДКЛЮЧАЕМСЯ К TELEGRAM
        // ==========================================
        const tg = window.Telegram.WebApp;
        tg.ready(); // Сообщаем Telegram, что приложение загружено

        // ==========================================
        // 2. ДАННЫЕ ИГРЫ
        // ==========================================
        let players = [];
        let currentTurn = 0;
        let argumentsList = [];

        // ==========================================
        // 3. ФУНКЦИИ (ЛОГИКА)
        // ==========================================

        // Старт битвы (собираем имена)
        function startBattle() {
            const p1 = document.getElementById('player1').value.trim() || 'Игрок 1';
            const p2 = document.getElementById('player2').value.trim() || 'Игрок 2';
            players = [p1, p2];
            argumentsList = [];
            currentTurn = 0;

            // Прячем настройки, показываем батл
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('battle-screen').classList.remove('hidden');
            
            updateTurnUI();
            
            // Отправляем данные в Telegram (можно сохранить в боте)
            tg.sendData(JSON.stringify({ 
                action: 'start', 
                players: players 
            }));
        }

        // Обновляем UI (чей ход)
        function updateTurnUI() {
            const playerName = players[currentTurn];
            document.getElementById('current-player').innerHTML = `Ход: <strong>${playerName}</strong>`;
            document.getElementById('argument-input').value = '';
            document.getElementById('argument-input').focus();
        }

        // Отправка аргумента
        function sendArgument() {
            const input = document.getElementById('argument-input');
            const text = input.value.trim();
            
            if (text === '') {
                alert('Напиши аргумент!');
                return;
            }

            // Сохраняем аргумент за текущим игроком
            argumentsList.push({
                player: players[currentTurn],
                text: text,
                turn: currentTurn
            });

            // Переключаем ход на следующего игрока
            currentTurn = (currentTurn + 1) % players.length;
            
            // Если оба сказали — показываем результат
            if (argumentsList.length === players.length) {
                showResult();
            } else {
                updateTurnUI();
            }

            // Отправляем данные в бот
            tg.sendData(JSON.stringify({
                action: 'argument',
                player: players[currentTurn],
                text: text
            }));
        }

        // Показать результаты
        function showResult() {
            document.getElementById('battle-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            let html = '';
            argumentsList.forEach((item, index) => {
                html += `<p><strong>${item.player}</strong>: ${item.text}</p>`;
            });
            
            // Простейшая "оценка" — выбираем случайного победителя (для демо)
            // В реальном боте сюда придет оценка от Yandex GPT
            const winner = argumentsList[Math.floor(Math.random() * argumentsList.length)].player;
            html += `<hr><h3>🎉 Победитель: <span style="color: #6c5ce7;">${winner}</span></h3>`;

            document.getElementById('result-text').innerHTML = html;

            tg.sendData(JSON.stringify({
                action: 'end',
                winner: winner,
                arguments: argumentsList
            }));
        }

        // Завершить досрочно
        function endBattle() {
            if (argumentsList.length > 0) {
                showResult();
            } else {
                alert('Никто не сказал ни слова!');
            }
        }

        // Сброс игры
        function resetGame() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('battle-screen').classList.add('hidden');
            players = [];
            argumentsList = [];
            currentTurn = 0;
        }

        // ==========================================
        // 4. ЗАПУСК ПРИ ЗАГРУЗКЕ
        // ==========================================
        console.log('Web App запущен!');
        tg.expand(); // Растягиваем на весь экран (опционально)
    </script>
</body>
</html>
